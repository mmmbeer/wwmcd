<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>what would my character do?</title>
    <link rel="stylesheet" href="./css/player-combat.css">
  </head>
  <body>
    <div class="app-shell" id="player-combat-app">
      <header class="app-header">
        <button class="utility-icon" type="button" aria-label="Open menu">☰</button>
        <div class="utility-title">
          <h1 id="app-title">Combat Turn</h1>
          <div class="header-character" id="header-character"></div>
        </div>
        <div class="header-actions" id="header-actions"></div>
      </header>

      <div id="turn-economy-panel"></div>
      <div id="combat-status-bar"></div>
      <div id="spellcasting-bar"></div>

      <main class="app-main">
        <div id="import-launcher"></div>

        <section class="panel action-panel" aria-labelledby="actions-title">
          <h2 id="actions-title" class="visually-hidden">Actions</h2>
          <div id="action-tabs"></div>
        </section>
      </main>

      <div id="planned-turn-bar"></div>
      <nav class="bottom-nav" aria-label="Primary navigation">
        <button class="bottom-nav-item is-active" type="button">⚔<span>Combat</span></button>
        <button class="bottom-nav-item" type="button">✧<span>Spells</span></button>
        <button class="bottom-nav-item" type="button">◆<span>Features</span></button>
        <button class="bottom-nav-item" type="button">▣<span>Gear</span></button>
        <button class="bottom-nav-item" type="button">☰<span>Notes</span></button>
      </nav>
    </div>

    <div id="modal-root"></div>
    <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./js/player-combat/bootstrap.js"></script>
  </body>
</html>
