<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>what would my character do?</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <link rel="stylesheet" href="./css/player-combat.css">
  </head>
  <body>
    <div class="app-shell" id="player-combat-app">
      <header class="app-header">
        <img class="app-logo" src="./assets/favicon.png" alt="" aria-hidden="true">
        <button class="utility-icon" id="utility-menu-button" type="button" aria-label="Open menu" aria-expanded="false">☰</button>
        <div class="utility-menu" id="utility-menu" hidden></div>
        <div class="utility-title">
          <h1 id="app-title">Combat Turn</h1>
          <div class="header-character" id="header-character"></div>
        </div>
        <div class="header-actions" id="header-actions"></div>
      </header>

      <div id="turn-economy-panel"></div>
      <div id="combat-status-bar"></div>
      <div id="spellcasting-bar"></div>

      <main class="app-main">
        <div id="import-launcher"></div>

        <section class="panel action-panel" aria-labelledby="actions-title">
          <h2 id="actions-title" class="visually-hidden">Actions</h2>
          <div id="action-tabs"></div>
        </section>
      </main>
    </div>

    <div id="modal-root"></div>
    <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>
    <div class="busy-overlay" id="busy-overlay" role="status" aria-live="polite" hidden>
      <div class="busy-card">
        <span class="busy-spinner" aria-hidden="true"></span>
        <strong id="busy-message">Working...</strong>
      </div>
    </div>

    <script type="module" src="./js/player-combat/bootstrap.js"></script>
  </body>
</html>
